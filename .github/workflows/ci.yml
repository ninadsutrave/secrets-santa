name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Lint Source
        run: npm run lint

      - name: Build Extension
        run: npm run build:all

      - name: Zip Artifacts
        run: npm run zip

      # For PRs and pushes to master
      - name: Upload Build Artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: |
            dist/chromium
            dist/firefox
            SecretsSanta-chromium.zip
            SecretsSanta-firefox.zip

      # For Pushes to tags (Releases)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SecretsSanta-chromium.zip
            SecretsSanta-firefox.zip
