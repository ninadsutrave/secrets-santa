<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>SecretsSanta</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="brand-mark">SS</div>
        <div class="brand-text">
          <div class="brand-title">SecretsSanta</div>
          <div class="brand-subtitle">Consul Companion</div>
        </div>
      </div>
      <button id="dark-toggle" class="icon-button" aria-label="Toggle dark mode">🌙</button>
    </div>

    <div id="status"></div>

    <div class="controls">
      <button id="loadBtn" class="btn primary span-2">Load Secrets</button>
      <button id="grantPermissionBtn" class="btn primary span-2 hidden">Grant Santa Access</button>
      <button id="loadSavedBtn" class="btn" disabled>Load Saved</button>
      <button id="saveBtn" class="btn" disabled>Save</button>
      <button id="compareBtn" class="btn hidden" disabled>Compare</button>
      <button id="downloadBtn" class="btn hidden" disabled>Download .env</button>
      <button id="intellijBtn" class="btn hidden" disabled>Copy JetBrains</button>
    </div>

    <div id="search-container">
      <input type="text" id="search-input" placeholder="Search keys..." />
    </div>

    <table id="secretsTable" class="hidden">
      <thead>
        <tr>
          <th>Key</th>
          <th>Value</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="secretsBody"></tbody>
    </table>

    <ul id="savedList" class="hidden"></ul>

    <div id="loader" class="hidden">
      <div class="spinner"></div>
    </div>

    <footer class="footer">
      Copyright © <a href="https://ninadsutrave.in" target="_blank" rel="noreferrer">Ninad Sutrave</a>
    </footer>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="popup.js"></script>
</body>

</html>
